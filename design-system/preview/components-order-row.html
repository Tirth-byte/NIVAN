<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display:flex; flex-direction:column; gap: 14px; }
  .item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; display:flex; align-items:center; gap: 14px; box-shadow: var(--inset-top); }
  .crest { width: 36px; height: 36px; border-radius: 8px; background: var(--surface-3); display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 12px; color: var(--accent-cyan); border:1px solid var(--border); }
  .meta { flex:1; }
  .meta .top { display:flex; gap: 8px; align-items:center; font-size: 13px; color: var(--text-primary); font-weight: 500; }
  .meta .top .id { font-family: var(--font-mono); color: var(--text-muted); font-weight: 400; font-size: 12px; }
  .meta .bot { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-family: var(--font-mono); }
  .progress { width: 240px; height: 6px; border-radius: 999px; background: var(--surface-3); overflow:hidden; }
  .progress > div { height: 100%; background: var(--grad-brand); border-radius: 999px; }
  .eta { font-family: var(--font-mono); font-size: 13px; color: var(--text-primary); width: 70px; text-align: right; }
  .badge { font-size: 10px; letter-spacing: 0.16em; padding: 3px 8px; border-radius: 999px; background: var(--success-soft); color: #7FE5BA; }
</style>
</head><body>
  <div class="item">
    <div class="crest">D2</div>
    <div class="meta">
      <div class="top">Diamond II → Master <span class="id">VTG‑8K3‑42091</span> <span class="badge">LIVE</span></div>
      <div class="bot">73% win · +18 LP avg · booster <span style="color:var(--accent-cyan)">@kazuya</span></div>
    </div>
    <div class="progress"><div style="width:62%"></div></div>
    <div class="eta">02:11 ETA</div>
  </div>
  <div class="item">
    <div class="crest" style="color: var(--accent-violet)">P3</div>
    <div class="meta">
      <div class="top">Plat III → Diamond IV <span class="id">VTG‑8K3‑42088</span></div>
      <div class="bot">Queued · matching booster · est. 4 min</div>
    </div>
    <div class="progress"><div style="width:8%"></div></div>
    <div class="eta">— · —</div>
  </div>
</body></html>
