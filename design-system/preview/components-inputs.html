<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display:flex; flex-direction:column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .input { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; height: 44px; padding: 0 14px; color: var(--text-primary); font-family: var(--font-body); font-size: 14px; transition: all 220ms cubic-bezier(0.22,1,0.36,1); }
  .input::placeholder { color: var(--text-muted); }
  .input:hover { border-color: var(--border-strong); }
  .input:focus { outline: none; border-color: var(--accent-violet); box-shadow: 0 0 0 4px rgba(124,92,255,0.15); }
  .input.focused { border-color: var(--accent-violet); box-shadow: 0 0 0 4px rgba(124,92,255,0.15); }
  .input.error { border-color: var(--danger); box-shadow: 0 0 0 4px rgba(255,92,124,0.12); }
  .help { font-size: 11px; color: var(--text-muted); }
  .help.err { color: var(--danger); }
  .with-icon { position: relative; }
  .with-icon .ic { position:absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-family: var(--font-mono); font-size: 14px; }
  .with-icon input { padding-left: 36px; }
</style>
</head><body>
  <div class="field">
    <label>Battle.net tag</label>
    <input class="input" placeholder="e.g. Vexen#2914"/>
    <span class="help">We never store credentials.</span>
  </div>
  <div class="field">
    <label>Promo code</label>
    <input class="input focused" value="VANTAGE‑20"/>
    <span class="help" style="color: var(--success)">−20% applied</span>
  </div>
  <div class="field">
    <label>Email</label>
    <div class="with-icon"><span class="ic">@</span><input class="input" placeholder="you@domain.com" style="width: calc(100% - 0px)"/></div>
  </div>
  <div class="field">
    <label>Card</label>
    <input class="input error" value="4242 4242 4242 0000"/>
    <span class="help err">Card declined — try another or use crypto.</span>
  </div>
</body></html>
