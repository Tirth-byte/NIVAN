<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pill { border-radius: 12px; padding: 16px; display:flex; flex-direction:column; gap:6px; height:120px; box-shadow: var(--inset-top); border: 1px solid var(--border); }
  .pill .dot { width: 12px; height: 12px; border-radius: 999px; }
  .pill .name { font-size: 13px; font-weight: 500; }
  .pill .desc { font-size: 12px; color: var(--text-secondary); margin-top:auto; }
  .pill .hex { font-family: var(--font-mono); font-size:11px; color: var(--text-muted); }
</style>
</head><body>
  <div class="row">
    <div class="pill" style="background: var(--success-soft)">
      <div class="dot" style="background: var(--success)"></div>
      <div class="name">success</div>
      <div class="desc">Order completed · payout cleared</div>
      <div class="hex">#36D399</div>
    </div>
    <div class="pill" style="background: var(--warning-soft)">
      <div class="dot" style="background: var(--warning)"></div>
      <div class="name">warning</div>
      <div class="desc">ETA at risk · awaiting booster</div>
      <div class="hex">#FFB547</div>
    </div>
    <div class="pill" style="background: var(--danger-soft)">
      <div class="dot" style="background: var(--danger)"></div>
      <div class="name">danger</div>
      <div class="desc">Payment failed · refund issued</div>
      <div class="hex">#FF5C7C</div>
    </div>
  </div>
</body></html>
