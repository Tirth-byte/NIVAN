<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 24px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .col { display:flex; flex-direction: column; gap: 8px; }
  .ttl { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }
  .pair { display:flex; gap: 10px; align-items:center; }
  .swatch { width: 24px; height: 24px; border-radius: 6px; border:1px solid var(--border); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .meta span { color: var(--text-muted); }
</style>
</head><body>
  <div class="col">
    <div class="ttl">Borders</div>
    <div class="pair"><div class="swatch" style="background: var(--border-faint)"></div><div class="meta">faint <span>· rgba(255,255,255,0.04)</span></div></div>
    <div class="pair"><div class="swatch" style="background: var(--border)"></div><div class="meta">default <span>· 0.06</span></div></div>
    <div class="pair"><div class="swatch" style="background: var(--border-strong)"></div><div class="meta">strong <span>· 0.12</span></div></div>
    <div class="pair"><div class="swatch" style="background: var(--border-focus)"></div><div class="meta">focus <span>· violet 0.5</span></div></div>
  </div>
  <div class="col">
    <div class="ttl">Glass / blur</div>
    <div style="position:relative; height: 100px; border-radius: 12px; overflow:hidden;">
      <div style="position:absolute; inset:0; background: var(--grad-bloom); filter: blur(8px);"></div>
      <div style="position:absolute; inset: 18px; background: rgba(14,16,20,0.65); backdrop-filter: blur(20px) saturate(140%); border:1px solid var(--border-strong); border-radius: 8px; box-shadow: var(--inset-top); display:flex; align-items:center; justify-content:center; font-size:12px; color: var(--text-secondary);">backdrop-filter: blur(20px)</div>
    </div>
  </div>
  <div class="col">
    <div class="ttl">Motion</div>
    <div class="meta">ease <span>cubic-bezier(0.22, 1, 0.36, 1)</span></div>
    <div class="meta">micro <span>120ms — hover</span></div>
    <div class="meta">small <span>220ms — press, toggle</span></div>
    <div class="meta">medium <span>380ms — overlay</span></div>
    <div class="meta">large <span>600ms — hero entrance</span></div>
  </div>
</body></html>
