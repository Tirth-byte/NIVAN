<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display:grid; grid-template-columns: 1.1fr 1fr; gap: 18px; }
  .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 22px; box-shadow: var(--inset-top); }
  .card.selected { border: 1px solid transparent; background: linear-gradient(var(--surface-2), var(--surface-2)) padding-box, var(--grad-brand) border-box; box-shadow: var(--glow-violet); }
  .eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; }
  h4 { margin: 0 0 6px; font-size: 18px; }
  p { font-size: 13px; color: var(--text-secondary); margin: 0; }
  .row { display:flex; align-items:baseline; gap: 8px; margin-top: 16px; }
  .price { font-family: var(--font-mono); font-feature-settings:"tnum"; font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }
  .per { color: var(--text-muted); font-size: 12px; }
</style>
</head><body>
  <div class="card">
    <div class="eyebrow">Default · resting</div>
    <h4>Rank Boosting</h4>
    <p>From Iron to Challenger. Pro climbs your account safely under VPN.</p>
    <div class="row"><span class="price">$24</span><span class="per">/ division</span></div>
  </div>
  <div class="card selected">
    <div class="eyebrow" style="color: #C9BCFF;">Selected · brand ring</div>
    <h4>Coaching</h4>
    <p>1:1 sessions with top-500 coaches. VOD review included.</p>
    <div class="row"><span class="price">$39</span><span class="per">/ hour</span></div>
  </div>
</body></html>
