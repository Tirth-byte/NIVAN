<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .bar { background: var(--grad-brand); border-radius: 4px; width: 28px; box-shadow: var(--inset-top); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .px  { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head><body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="lbl">5</div><div class="px">20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="lbl">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="lbl">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="lbl">10</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="lbl">12</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="lbl">16</div><div class="px">64</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="lbl">20</div><div class="px">80</div></div>
    <div class="item"><div class="bar" style="height:120px"></div><div class="lbl">30</div><div class="px">120</div></div>
  </div>
</body></html>
