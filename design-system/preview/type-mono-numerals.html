<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .grid { display:grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 14px; }
  .card { background: var(--surface-2); border:1px solid var(--border); border-radius: 12px; padding: 18px; box-shadow: var(--inset-top); }
  .stat { font-family: var(--font-mono); font-feature-settings: "tnum","ss01"; font-size: 40px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; color: var(--text-primary); }
  .delta { font-family: var(--font-mono); color: var(--success); font-size: 13px; }
  .label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; }
  .id { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
</style>
</head><body>
  <div class="grid">
    <div class="card">
      <div class="label">avg. delivery</div>
      <div class="stat">3.24<span style="font-size:18px; color: var(--text-secondary)"> d</span></div>
      <div class="delta" style="margin-top:8px;">↓ 11% wk</div>
    </div>
    <div class="card">
      <div class="label">order id</div>
      <div class="id">VTG‑8K3‑42091</div>
      <div class="id" style="margin-top: 8px;">$184.20 · ETA 02:11</div>
    </div>
    <div class="card">
      <div class="label">win rate</div>
      <div class="stat">73<span style="font-size:18px; color: var(--text-secondary)">%</span></div>
      <div class="delta">↑ 4.2 pts</div>
    </div>
  </div>
</body></html>
