<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 24px; }
  .row { display:flex; gap: 12px; align-items:center; flex-wrap:wrap; }
  .row + .row { margin-top: 14px; }

  .btn { display:inline-flex; align-items:center; gap:8px; height: 40px; padding: 0 18px; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 500; letter-spacing: -0.005em; cursor: pointer; border: none; transition: all 200ms cubic-bezier(0.22,1,0.36,1); }
  .btn .arrow { font-family: var(--font-mono); }

  .btn-primary { background: var(--grad-brand); color: #fff; box-shadow: var(--inset-top-strong), 0 0 32px rgba(124,92,255,0.35); }
  .btn-primary:hover { filter: brightness(1.08); }

  .btn-secondary { background: var(--surface-3); color: var(--text-primary); border: 1px solid var(--border-strong); box-shadow: var(--inset-top); }
  .btn-secondary:hover { background: var(--surface-4); }

  .btn-ghost { background: transparent; color: var(--text-primary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: var(--border-strong); }

  .btn-link { background: transparent; color: var(--text-primary); padding: 0; height: auto; }

  .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
  .btn-lg { height: 52px; padding: 0 24px; font-size: 16px; border-radius: 10px; }

  .icn { width: 14px; height: 14px; }
</style>
</head><body>
  <div class="row">
    <button class="btn btn-primary btn-lg">Start boost <span class="arrow">→</span></button>
    <button class="btn btn-primary">Match me with a booster</button>
    <button class="btn btn-secondary">See live orders</button>
    <button class="btn btn-ghost">Pricing</button>
    <button class="btn btn-link">Learn more <span class="arrow">→</span></button>
  </div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Top up</button>
    <button class="btn btn-secondary btn-sm">Cancel</button>
    <button class="btn btn-ghost btn-sm">Filter</button>
    <button class="btn btn-secondary btn-sm" disabled style="opacity:0.4; cursor:not-allowed">Disabled</button>
  </div>
</body></html>
