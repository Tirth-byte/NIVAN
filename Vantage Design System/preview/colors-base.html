<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 12px; padding: 14px; height: 110px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); box-shadow: var(--inset-top); }
  .swatch .name { font-size: 12px; color: var(--text-primary); font-weight: 500; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head><body>
  <div class="row">
    <div class="swatch" style="background:#07080A"><span class="name">bg</span><span class="hex">#07080A</span></div>
    <div class="swatch" style="background:#0E1014"><span class="name">surface‑1</span><span class="hex">#0E1014</span></div>
    <div class="swatch" style="background:#15181E"><span class="name">surface‑2</span><span class="hex">#15181E</span></div>
    <div class="swatch" style="background:#1C2028"><span class="name">surface‑3</span><span class="hex">#1C2028</span></div>
  </div>
</body></html>
