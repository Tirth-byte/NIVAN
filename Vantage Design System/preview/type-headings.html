<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .stack { display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 86px; flex-shrink:0; }
  h1.s { font-size: 40px; }
  h2.s { font-size: 32px; }
  h3.s { font-size: 24px; }
  h4.s { font-size: 20px; }
  h5.s { font-size: 16px; font-weight:600; }
</style>
</head><body>
  <div class="stack">
    <div class="row"><span class="meta">h1 · 40</span><h1 class="s">Pro players. Real wins.</h1></div>
    <div class="row"><span class="meta">h2 · 32</span><h2 class="s">A configurator built for climbers.</h2></div>
    <div class="row"><span class="meta">h3 · 24</span><h3 class="s">Match me with a booster</h3></div>
    <div class="row"><span class="meta">h4 · 20</span><h4 class="s">Add‑ons</h4></div>
    <div class="row"><span class="meta">h5 · 16</span><h5 class="s">Order summary</h5></div>
  </div>
</body></html>
