<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display:flex; flex-direction:column; gap: 16px; }
  .row { display:flex; align-items:center; gap: 16px; }

  .toggle { width: 44px; height: 26px; background: var(--surface-3); border:1px solid var(--border); border-radius: 999px; position: relative; cursor:pointer; transition: 220ms cubic-bezier(0.22,1,0.36,1); }
  .toggle .knob { position:absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 999px; background: #F5F6F8; transition: 220ms cubic-bezier(0.22,1,0.36,1); box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .toggle.on { background: var(--grad-brand); border-color: transparent; }
  .toggle.on .knob { left: 20px; }

  .seg { display:inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
  .seg button { background:transparent; color: var(--text-secondary); padding: 6px 14px; border: none; border-radius: 7px; font-family: var(--font-body); font-size: 13px; cursor:pointer; transition: 200ms cubic-bezier(0.22,1,0.36,1); }
  .seg button.active { background: var(--surface-4); color: var(--text-primary); box-shadow: var(--inset-top); }

  .check { width: 20px; height: 20px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--surface-2); display:inline-flex; align-items:center; justify-content:center; }
  .check.on { background: var(--grad-brand); border-color: transparent; }
  .check.on::after { content:""; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(1px,-1px); }

  .label { font-size: 13px; color: var(--text-secondary); }
</style>
</head><body>
  <div class="row">
    <div class="toggle"><div class="knob"></div></div>
    <div class="toggle on"><div class="knob"></div></div>
    <span class="label">Duo queue · stream off</span>
  </div>
  <div class="row">
    <div class="seg">
      <button>Solo</button>
      <button class="active">Duo</button>
      <button>Coaching</button>
    </div>
    <span class="label">Segmented · order mode</span>
  </div>
  <div class="row">
    <div class="check"></div>
    <div class="check on"></div>
    <span class="label">Off-role guarantee · priority queue</span>
  </div>
</body></html>
