<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { background: var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:18px; height: 110px; display:flex; flex-direction:column; gap:10px; box-shadow: var(--inset-top); }
  .label { font-size:12px; color: var(--text-secondary); }
  .sample { font-size:18px; font-weight:600; letter-spacing:-0.02em; }
  .hex { font-family: var(--font-mono); font-size:11px; color: var(--text-muted); margin-top:auto; }
</style>
</head><body>
  <div class="row">
    <div class="card"><span class="label">primary</span><span class="sample" style="color:#F5F6F8">Diamond promo lock-in</span><span class="hex">#F5F6F8</span></div>
    <div class="card"><span class="label">secondary</span><span class="sample" style="color:#9AA0AB">Diamond promo lock-in</span><span class="hex">#9AA0AB</span></div>
    <div class="card"><span class="label">muted</span><span class="sample" style="color:#5C6270">Diamond promo lock-in</span><span class="hex">#5C6270</span></div>
  </div>
</body></html>
