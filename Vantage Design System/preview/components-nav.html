<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; margin: 0; }
  nav { display:flex; align-items:center; padding: 16px 24px; gap: 24px; background: rgba(14,16,20,0.65); backdrop-filter: blur(20px) saturate(140%); border-bottom: 1px solid var(--border); }
  .brand { display:flex; align-items:center; gap: 8px; font-weight: 700; letter-spacing: -0.02em; font-size: 16px; }
  .brand-mark { width: 26px; height: 26px; }
  .links { display:flex; gap: 24px; margin-left: 24px; }
  .links a { color: var(--text-secondary); font-size: 14px; transition: 120ms; }
  .links a:hover, .links a.active { color: var(--text-primary); }
  .actions { margin-left: auto; display:flex; align-items:center; gap: 12px; }
  .btn-ghost { background: transparent; border:1px solid var(--border); color: var(--text-primary); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor:pointer; }
  .btn-primary { background: var(--grad-brand); color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor:pointer; box-shadow: var(--inset-top-strong); }
</style>
</head><body>
  <nav>
    <div class="brand">
      <img src="../assets/logo-mark.svg" class="brand-mark" alt=""/>
      vantage
    </div>
    <div class="links">
      <a class="active">Services</a>
      <a>Coaching</a>
      <a>Pricing</a>
      <a>Boosters</a>
      <a>Live</a>
    </div>
    <div class="actions">
      <button class="btn-ghost">Sign in</button>
      <button class="btn-primary">Start boost →</button>
    </div>
  </nav>
</body></html>
