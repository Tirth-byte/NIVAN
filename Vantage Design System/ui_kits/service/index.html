<title>Vantage — configure your boost</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; background: var(--bg); color: var(--text-primary); }
  @keyframes vtgFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
  @keyframes vtgPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
  .vtg-btn:hover { filter: brightness(1.08); }
  .vtg-btn:active { transform: scale(0.98); transition: transform 80ms; }
  a:hover { color: var(--accent-azure) !important; }
</style>
